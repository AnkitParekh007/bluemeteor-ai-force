<div
	class="flex h-[100dvh] flex-col overflow-hidden bg-gradient-to-br from-slate-50 via-violet-50/40 to-cyan-50/35 dark:from-slate-950 dark:via-indigo-950/50 dark:to-cyan-950/25"
>
	@if (apiErrors.lastHttpError(); as err) {
		<div
			class="flex shrink-0 items-center justify-between gap-2 border-b border-amber-200 bg-amber-50 px-3 py-2 text-sm text-amber-950 dark:border-amber-900 dark:bg-amber-950/40 dark:text-amber-100"
			role="alert"
		>
			<span
				><strong class="font-semibold">API {{ err.status || 'error' }}:</strong>
				{{ err.message }}</span
			>
			<button
				type="button"
				class="shrink-0 rounded-md px-2 py-1 text-xs font-semibold text-amber-950 underline dark:text-amber-100"
				(click)="dismissApiError()"
			>
				Dismiss
			</button>
		</div>
	}
	<app-header />
	<div class="flex min-h-0 min-w-0 flex-1">
		<app-sidenav />
		<main class="min-w-0 flex-1 overflow-auto p-5 sm:p-6 lg:p-8">
			<router-outlet />
		</main>
	</div>
</div>
