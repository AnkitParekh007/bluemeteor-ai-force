<div class="mx-auto flex max-w-6xl flex-col gap-6">
	<div>
		<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Pilot</h1>
		<p class="mt-1 text-sm text-slate-600 dark:text-slate-400">
			Internal launch pack: onboarding, guides, demos, feedback, and readiness for Bluemeteor AI Force.
		</p>
	</div>

	<nav
		class="flex flex-wrap gap-2 border-b border-violet-200/70 pb-3 dark:border-indigo-800/70"
		aria-label="Pilot sections"
	>
		@for (link of navLinks(); track link.path) {
			<a
				[routerLink]="['/pilot', link.path]"
				routerLinkActive="bg-violet-600 text-white ring-1 ring-violet-500 shadow-sm"
				[routerLinkActiveOptions]="{ exact: true }"
				class="rounded-lg px-3 py-1.5 text-xs font-semibold text-slate-700 transition hover:bg-violet-50 dark:text-slate-200 dark:hover:bg-indigo-950/60"
			>
				{{ link.label }}
			</a>
		}
	</nav>

	<router-outlet />
</div>
