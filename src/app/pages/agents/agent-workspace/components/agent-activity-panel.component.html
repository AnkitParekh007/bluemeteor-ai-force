<div class="flex h-full min-h-0 flex-col">
	@if (events().length === 0) {
		<div class="flex flex-1 flex-col items-center justify-center gap-2 px-4 py-10 text-center">
			<i class="pi pi-history text-2xl text-slate-400"></i>
			<p class="text-sm text-slate-600 dark:text-slate-400">No runtime events yet.</p>
		</div>
	} @else {
		<ul
			class="relative min-h-0 flex-1 space-y-0 overflow-y-auto px-3 py-2 before:absolute before:left-[17px] before:top-2 before:bottom-2 before:w-px before:bg-violet-200/80 dark:before:bg-indigo-800/80"
		>
			@for (e of events(); track e.id) {
				<li class="relative flex gap-3 pl-8">
					<span
						class="absolute left-1 top-1.5 z-10 h-2.5 w-2.5 rounded-full border-2 border-white bg-violet-500 dark:border-slate-950 dark:bg-indigo-400"
					></span>
					<div class="min-w-0 flex-1 pb-3">
						<div class="flex flex-wrap items-baseline gap-2">
							<span
								class="rounded bg-slate-100 px-1.5 py-0.5 text-[10px] font-bold uppercase text-slate-600 dark:bg-slate-800 dark:text-slate-300"
								>{{ e.type }}</span
							>
							<span class="text-[10px] text-slate-500">{{
								e.timestamp | date: 'medium'
							}}</span>
						</div>
						<p class="mt-0.5 text-sm font-medium text-slate-900 dark:text-slate-100">
							{{ e.title }}
						</p>
						@if (e.message) {
							<p class="mt-0.5 text-xs text-slate-600 dark:text-slate-400">
								{{ e.message }}
							</p>
						}
					</div>
				</li>
			}
		</ul>
	}
</div>
