<div
	class="shrink-0 border-t border-violet-200/60 bg-white/95 px-3 py-2 dark:border-indigo-900/60 dark:bg-slate-950/95 sm:px-4"
>
	@if (quickTasks().length) {
		<div class="mb-2 flex flex-wrap gap-1.5">
			@for (q of quickTasks(); track q) {
				<button
					type="button"
					[disabled]="disabled()"
					(click)="onQuickTask(q)"
					class="rounded-full border border-cyan-500/40 bg-cyan-50/90 px-2.5 py-1 text-left text-[11px] font-medium text-cyan-900 transition hover:bg-cyan-100 disabled:opacity-50 dark:border-cyan-800/50 dark:bg-cyan-950/40 dark:text-cyan-100 dark:hover:bg-cyan-950/70"
				>
					{{ q }}
				</button>
			}
		</div>
	}

	<div
		class="flex flex-col gap-2 rounded-xl border border-violet-200/70 bg-white shadow-inner dark:border-indigo-800 dark:bg-slate-900"
	>
		<textarea
			#ta
			rows="1"
			class="max-h-40 min-h-[44px] w-full resize-none rounded-t-xl border-0 bg-transparent px-3 py-2.5 text-sm text-slate-900 outline-none placeholder:text-slate-400 dark:text-slate-100"
			[placeholder]="placeholder()"
			[disabled]="disabled()"
			[value]="draft()"
			(input)="draft.set(($any($event.target).value ?? '') + ''); autoGrow(ta)"
			(keydown)="onKeydown($event)"
		></textarea>
		<div
			class="flex items-center justify-between gap-2 border-t border-violet-100 px-2 py-1.5 dark:border-indigo-900/80"
		>
			<div class="flex items-center gap-1">
				<button
					type="button"
					[disabled]="disabled()"
					(click)="attachClicked.emit()"
					class="inline-flex h-8 items-center gap-1 rounded-lg px-2 text-xs font-medium text-slate-600 transition hover:bg-violet-50 disabled:opacity-50 dark:text-slate-400 dark:hover:bg-slate-800"
					title="Attach"
				>
					<i class="pi pi-paperclip"></i>
					<span class="hidden sm:inline">Attach</span>
				</button>
				<button
					type="button"
					[disabled]="disabled()"
					(click)="contextClicked.emit()"
					class="inline-flex h-8 items-center gap-1 rounded-lg px-2 text-xs font-medium text-slate-600 transition hover:bg-violet-50 disabled:opacity-50 dark:text-slate-400 dark:hover:bg-slate-800"
					title="Context"
				>
					<i class="pi pi-at"></i>
					<span class="hidden sm:inline">Context</span>
				</button>
			</div>
			<span class="hidden text-[10px] text-slate-400 sm:inline"
				>Enter to send · Shift+Enter newline</span
			>
			<button
				type="button"
				[disabled]="disabled() || !draft().trim()"
				(click)="submit()"
				class="inline-flex h-9 items-center gap-1.5 rounded-lg bg-gradient-to-r from-cyan-500 to-violet-600 px-4 text-xs font-semibold text-white shadow-sm transition hover:from-cyan-400 hover:to-violet-500 disabled:cursor-not-allowed disabled:opacity-50"
			>
				<i class="pi pi-send text-sm"></i>
				Send
			</button>
		</div>
	</div>
</div>
