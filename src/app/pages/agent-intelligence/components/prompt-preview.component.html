<div class="rounded-xl border border-violet-200/60 bg-white p-4 dark:border-indigo-800 dark:bg-slate-900/80">
	<div class="flex flex-wrap items-center justify-between gap-2">
		<div>
			<p class="text-sm font-semibold">{{ template().name }} <span class="font-normal text-slate-500">v{{ template().version }}</span></p>
			<p class="text-xs text-slate-500">{{ template().type }} · {{ template().status }}</p>
		</div>
		<button
			type="button"
			class="rounded-lg bg-violet-600 px-3 py-1.5 text-sm text-white hover:bg-violet-700"
			(click)="loadRender()"
		>
			Render preview
		</button>
	</div>
	@if (loading()) {
		<p class="mt-2 text-xs text-slate-500">Rendering…</p>
	}
	@if (missing().length) {
		<p class="mt-2 text-xs text-amber-700 dark:text-amber-300">Missing variables: {{ missing().join(', ') }}</p>
	}
	<div class="mt-3 grid gap-3 md:grid-cols-2">
		<div>
			<p class="text-xs font-medium uppercase text-slate-500">Source</p>
			<pre class="mt-1 max-h-64 overflow-auto rounded bg-slate-100 p-2 text-xs dark:bg-slate-950">{{ template().content }}</pre>
			<button type="button" class="mt-1 text-xs text-violet-700 underline" (click)="copy(template().content)">Copy</button>
		</div>
		<div>
			<p class="text-xs font-medium uppercase text-slate-500">Rendered</p>
			<pre class="mt-1 max-h-64 overflow-auto rounded bg-slate-100 p-2 text-xs dark:bg-slate-950">{{ rendered() || '—' }}</pre>
			@if (rendered()) {
				<button type="button" class="mt-1 text-xs text-violet-700 underline" (click)="copy(rendered())">Copy</button>
			}
		</div>
	</div>
</div>
