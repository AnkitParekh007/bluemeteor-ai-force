<div class="overflow-x-auto rounded-xl border border-violet-200/60 dark:border-indigo-800">
	<table class="w-full text-left text-sm">
		<thead class="border-b border-violet-100 bg-violet-50/80 text-xs font-semibold uppercase dark:border-indigo-900 dark:bg-indigo-950/50">
			<tr>
				<th class="px-3 py-2">Pack</th>
				<th class="px-3 py-2">Status</th>
				<th class="px-3 py-2">Tools</th>
				<th class="px-3 py-2">Workflow ids</th>
			</tr>
		</thead>
		<tbody>
			@for (p of packs(); track p.id) {
				<tr class="border-b border-violet-50 dark:border-indigo-900/60">
					<td class="px-3 py-2">
						<div class="font-medium">{{ p.name }}</div>
						<div class="text-xs text-slate-500">{{ p.key }}</div>
					</td>
					<td class="px-3 py-2">{{ p.status }}</td>
					<td class="px-3 py-2 text-xs">{{ p.toolIds.join(', ') }}</td>
					<td class="px-3 py-2 text-xs">{{ p.workflowTemplateIds.join(', ') }}</td>
				</tr>
			}
		</tbody>
	</table>
</div>
<p class="mt-2 text-xs text-slate-500">
	Activate/disable packs via API (<code class="rounded bg-black/10 px-1">agents.manage</code>) — UI lists read-only for engineers with readiness access.
</p>
