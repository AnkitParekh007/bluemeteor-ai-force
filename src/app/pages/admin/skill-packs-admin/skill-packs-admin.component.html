<div class="mx-auto max-w-6xl space-y-4">
	<p-confirmDialog />
	<app-admin-section-header
		title="Skill packs"
		subtitle="Tool and workflow bundles per agent. High-risk tools still require approvals and permissions."
	/>

	<label class="flex items-center gap-2 text-sm">
		Agent
		<select
			class="rounded border px-2 py-1 dark:bg-slate-900"
			[(ngModel)]="agentSlug"
			(ngModelChange)="load()"
		>
			@for (s of slugs; track s) {
				<option [value]="s">{{ s }}</option>
			}
		</select>
	</label>

	<div class="overflow-x-auto rounded-lg border dark:border-slate-700">
		<table class="w-full min-w-[800px] text-left text-xs">
			<thead class="bg-slate-100/80 dark:bg-slate-800/80">
				<tr>
					<th class="px-2 py-2">Key</th>
					<th class="px-2 py-2">Name</th>
					<th class="px-2 py-2">Status</th>
					<th class="px-2 py-2">Tools</th>
					<th class="px-2 py-2 text-right">Actions</th>
				</tr>
			</thead>
			<tbody>
				@for (p of rows(); track p.id) {
					<tr class="border-t border-slate-200/70 dark:border-slate-700">
						<td class="px-2 py-1.5 font-mono">{{ p.key }}</td>
						<td class="px-2 py-1.5">{{ p.name }}</td>
						<td class="px-2 py-1.5">{{ p.status }}</td>
						<td class="px-2 py-1.5">
							<div class="flex flex-wrap gap-1">
								@for (tid of p.toolIds; track tid) {
									<span class="rounded bg-slate-200/60 px-1 dark:bg-slate-700">{{ tid }}</span>
								}
							</div>
						</td>
						<td class="px-2 py-1.5 text-right space-x-1">
							@if (auth.hasPermission('agents.manage')) {
								<p-button label="Activate" size="small" (onClick)="activate(p.id)" />
								<p-button label="Disable" size="small" [outlined]="true" (onClick)="disable(p.id)" />
							}
							<a
								[routerLink]="['/admin', 'tools']"
								class="text-[11px] text-violet-700 underline dark:text-violet-300"
								>Tools</a
							>
						</td>
					</tr>
				}
			</tbody>
		</table>
	</div>
</div>
