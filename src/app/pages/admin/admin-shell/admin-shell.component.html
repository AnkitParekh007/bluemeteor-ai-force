<div class="flex min-h-[calc(100vh-0px)] flex-col bg-slate-100/80 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
	<header
		class="flex flex-wrap items-center gap-3 border-b border-slate-200/80 bg-white/95 px-4 py-2 dark:border-slate-800 dark:bg-slate-900/95"
	>
		<div class="flex min-w-[160px] flex-1 flex-col gap-0.5">
			<span class="text-sm font-semibold tracking-tight">Admin Console</span>
			<span class="text-[11px] text-slate-500 dark:text-slate-400">Bluemeteor AI Force</span>
		</div>
		<div class="flex flex-wrap items-center gap-2">
			<span
				class="rounded border border-slate-300 px-2 py-0.5 text-[11px] font-semibold uppercase dark:border-slate-600"
				>{{ deployEnv }}</span
			>
			@if (healthLoading()) {
				<span class="text-xs text-slate-500">Checking API…</span>
			} @else if (healthOk() === true) {
				<span
					class="rounded bg-emerald-500/15 px-2 py-0.5 text-[11px] font-semibold text-emerald-800 dark:text-emerald-200"
					>API ok</span
				>
			} @else if (healthOk() === false) {
				<span
					class="rounded bg-red-500/15 px-2 py-0.5 text-[11px] font-semibold text-red-800 dark:text-red-200"
					>API unreachable</span
				>
			}
			<span class="max-w-[200px] truncate text-xs text-slate-600 dark:text-slate-300" [title]="userLabel()">{{
				userLabel()
			}}</span>
			<p-button label="Refresh" icon="pi pi-refresh" size="small" [outlined]="true" (onClick)="refreshHealth()" />
		</div>
	</header>
	<div class="flex min-h-0 flex-1">
		<nav
			class="w-52 shrink-0 border-r border-slate-200/80 bg-white/90 py-3 dark:border-slate-800 dark:bg-slate-900/90"
		>
			<ul class="space-y-0.5 px-2">
				@for (item of navItems(); track item.path) {
					<li>
						<a
							[routerLink]="['/admin', item.path]"
							routerLinkActive="bg-violet-600/15 font-semibold text-violet-900 dark:bg-violet-500/20 dark:text-violet-100"
							class="block rounded-md px-2 py-1.5 text-sm text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800/80"
						>
							{{ item.label }}
						</a>
					</li>
				}
			</ul>
			<div class="mt-4 border-t border-slate-200/70 px-3 pt-3 dark:border-slate-800">
				<a
					routerLink="/dashboard"
					class="text-xs font-medium text-violet-700 hover:underline dark:text-violet-300"
					>← Main workspace</a
				>
			</div>
		</nav>
		<main class="min-h-0 flex-1 overflow-auto p-4 md:p-6">
			<router-outlet />
		</main>
	</div>
</div>
